<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escala de Sonoplastia - Igreja Adventista Liberdade</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
            background: linear-gradient(135deg, #534AB7 0%, #7F77DD 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(83, 74, 183, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #534AB7 0%, #3C3489 100%);
            color: white;
            padding: 40px 20px;
            text-align: center;
        }

        .header-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .header h1 {
            font-size: 32px;
            margin-bottom: 8px;
            font-weight: 700;
        }

        .header p {
            font-size: 16px;
            opacity: 0.9;
        }

        .sync-status {
            display: inline-block;
            margin-top: 12px;
            padding: 8px 16px;
            background: rgba(255,255,255,0.2);
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .sync-status.connected {
            background: rgba(76, 175, 80, 0.3);
            color: #4CAF50;
        }

        .sync-status.disconnected {
            background: rgba(244, 67, 54, 0.3);
            color: #F44336;
        }

        .tabs {
            display: flex;
            border-bottom: 2px solid #f0f0f0;
            background: #fafafa;
        }

        .tab-button {
            flex: 1;
            padding: 16px;
            border: none;
            background: transparent;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            color: #999;
            transition: all 0.3s;
            border-bottom: 3px solid transparent;
            margin-bottom: -2px;
        }

        .tab-button.active {
            color: #534AB7;
            border-bottom-color: #534AB7;
            background: white;
        }

        .tab-button:hover {
            color: #534AB7;
            background: white;
        }

        .tab-content {
            display: none;
            padding: 30px;
            animation: fadeIn 0.3s;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .loading i {
            font-size: 32px;
            margin-bottom: 16px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #534AB7;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #534AB7 0%, #3C3489 100%);
            color: white;
            width: 100%;
            justify-content: center;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(83, 74, 183, 0.3);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
            padding: 8px 12px;
            font-size: 12px;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .btn-danger {
            background: #ff6b6b;
            color: white;
            padding: 8px 12px;
            font-size: 12px;
        }

        .btn-danger:hover {
            background: #ee5a52;
        }

        .semana-card {
            background: #f9f9f9;
            border: 2px solid #e8e8e8;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            transition: all 0.3s;
        }

        .semana-card:hover {
            border-color: #534AB7;
            box-shadow: 0 4px 12px rgba(83, 74, 183, 0.1);
        }

        .semana-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 16px;
        }

        .semana-info h3 {
            font-size: 18px;
            color: #534AB7;
            margin-bottom: 4px;
        }

        .semana-info p {
            font-size: 12px;
            color: #999;
        }

        .semana-actions {
            display: flex;
            gap: 8px;
        }

        .dias-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 12px;
            margin-bottom: 16px;
        }

        .dia-box {
            background: white;
            border: 2px solid #f0f0f0;
            border-radius: 8px;
            padding: 12px;
            text-align: center;
            transition: all 0.3s;
        }

        .dia-box.principal {
            background: linear-gradient(135deg, #E6F1FB 0%, #D1E5F7 100%);
            border-color: #85B7EB;
            box-shadow: 0 2px 8px rgba(53, 119, 221, 0.15);
        }

        .dia-box .dia-nome {
            font-weight: 700;
            font-size: 12px;
            color: #666;
            margin-bottom: 4px;
            text-transform: uppercase;
        }

        .dia-box.principal .dia-nome {
            color: #185FA5;
        }

        .dia-box .dia-data {
            font-size: 14px;
            font-weight: 600;
            color: #333;
        }

        .dia-box.principal .dia-data {
            color: #185FA5;
        }

        .dia-box .dia-icon {
            font-size: 16px;
            margin-top: 4px;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
        }

        .empty-state i {
            font-size: 48px;
            color: #ddd;
            margin-bottom: 16px;
        }

        .empty-state h3 {
            color: #999;
            margin-bottom: 8px;
        }

        .empty-state p {
            color: #bbb;
            font-size: 14px;
        }

        .info-box {
            background: #EEEDFE;
            border: 2px solid #CECBF6;
            border-radius: 8px;
            padding: 16px;
            margin-top: 20px;
            font-size: 14px;
            color: #3C3489;
        }

        .info-box i {
            margin-right: 8px;
        }

        .success-message {
            background: #C8E6C9;
            color: #2E7D32;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 16px;
            display: none;
        }

        .success-message.show {
            display: block;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 16px;
            margin-top: 30px;
            padding-top: 30px;
            border-top: 2px solid #f0f0f0;
        }

        .stat-card {
            background: linear-gradient(135deg, #534AB7 0%, #7F77DD 100%);
            color: white;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-card .label {
            font-size: 12px;
            opacity: 0.9;
            margin-bottom: 8px;
        }

        .stat-card .value {
            font-size: 32px;
            font-weight: 700;
        }

        .edit-form {
            background: white;
            border: 2px solid #f0f0f0;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 16px;
        }

        .edit-form input {
            width: 100%;
            margin-bottom: 12px;
        }

        .edit-form .buttons {
            display: flex;
            gap: 8px;
        }

        .edit-form .btn {
            flex: 1;
        }

        .sync-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #4CAF50;
            margin-right: 6px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 24px;
            }

            .dias-grid {
                grid-template-columns: repeat(7, 1fr);
            }

            .dia-box {
                padding: 8px;
            }

            .dia-box .dia-data {
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-icon">🎵</div>
            <h1>Escala de Sonoplastia</h1>
            <p>Igreja Adventista Liberdade</p>
            <div class="sync-status" id="syncStatus">
                <span class="sync-indicator"></span>
                <span id="syncText">Conectando...</span>
            </div>
        </div>

        <div class="tabs">
            <button class="tab-button active" onclick="mudarAba(0)">
                <i class="fas fa-calendar"></i> Visualizar Escala
            </button>
            <button class="tab-button" onclick="mudarAba(1)">
                <i class="fas fa-plus"></i> Nova Semana
            </button>
        </div>

        <!-- Aba Visualizar -->
        <div id="tab-0" class="tab-content active">
            <div id="escala-container"></div>
        </div>

        <!-- Aba Nova Semana -->
        <div id="tab-1" class="tab-content">
            <div style="max-width: 500px;">
                <div class="success-message" id="successMessage">
                    <i class="fas fa-check"></i> Semana adicionada com sucesso!
                </div>

                <h2 style="margin-bottom: 20px; color: #333;">
                    <i class="fas fa-plus" style="margin-right: 8px;"></i> Adicionar Nova Semana
                </h2>
                
                <div class="form-group">
                    <label for="nomeOperador">Nome do Operador</label>
                    <input type="text" id="nomeOperador" placeholder="Digite o nome do sonoplasta">
                </div>

                <div class="form-group">
                    <label for="dataInicio">Data de Início da Semana</label>
                    <input type="date" id="dataInicio">
                </div>

                <button class="btn btn-primary" id="btnAdicionar" onclick="adicionarSemana()">
                    <i class="fas fa-check"></i> Adicionar Semana
                </button>

                <div class="info-box">
                    <i class="fas fa-lightbulb"></i>
                    <strong>Dica:</strong> A escala normalmente começa na quarta-feira, com eventos no sábado e domingo. Todos os sonoplastas verão a mesma escala em tempo real!
                </div>
            </div>
        </div>
    </div>

    <!-- Firebase (Versão Compat - funciona com script global) -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <script>
        // Configuração Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyAMYMp2Vn9ZI98ypQbi1KyoHWc4J4xrgn4",
            authDomain: "sonoplastia-escala.firebaseapp.com",
            databaseURL: "https://sonoplastia-escala-default-rtdb.firebaseio.com",
            projectId: "sonoplastia-escala",
            storageBucket: "sonoplastia-escala.firebasestorage.app",
            messagingSenderId: "33184332982",
            appId: "1:33184332982:web:2c86445488eff96209fa17",
            measurementId: "G-2P231T12HM"
        };

        // Inicializar Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const semanasRef = database.ref('semanas');

        const diasSemana = ['Dom', 'Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sab'];
        let semanas = [];
        let estaEditando = {};

        // Verificar conexão Firebase
        const connectedRef = database.ref('.info/connected');
        connectedRef.on('value', (snap) => {
            if (snap.val() === true) {
                document.getElementById('syncStatus').classList.add('connected');
                document.getElementById('syncStatus').classList.remove('disconnected');
                document.getElementById('syncText').textContent = 'Sincronizado';
            } else {
                document.getElementById('syncStatus').classList.remove('connected');
                document.getElementById('syncStatus').classList.add('disconnected');
                document.getElementById('syncText').textContent = 'Desconectado';
            }
        });

        // Carregamento em tempo real
        semanasRef.on('value', (snapshot) => {
            semanas = [];
            snapshot.forEach((childSnapshot) => {
                semanas.push({
                    id: childSnapshot.key,
                    ...childSnapshot.val()
                });
            });
            semanas.sort((a, b) => new Date(a.dataInicio) - new Date(b.dataInicio));
            renderizarEscala();
        });

        function mudarAba(n) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-button').forEach(el => el.classList.remove('active'));
            document.getElementById('tab-' + n).classList.add('active');
            document.querySelectorAll('.tab-button')[n].classList.add('active');
        }

        function adicionarSemana() {
            const nome = document.getElementById('nomeOperador').value.trim();
            const data = document.getElementById('dataInicio').value;
            const btnAdicionar = document.getElementById('btnAdicionar');

            if (!nome || !data) {
                alert('Preencha o nome do operador e a data!');
                return;
            }

            btnAdicionar.disabled = true;

            const novaSemanaid = semanasRef.push().key;
            semanasRef.child(novaSemanaid).set({
                dataInicio: data,
                operador: nome,
                timestamp: new Date().toISOString()
            }).then(() => {
                document.getElementById('nomeOperador').value = '';
                document.getElementById('dataInicio').value = '';
                btnAdicionar.disabled = false;

                const msg = document.getElementById('successMessage');
                msg.classList.add('show');
                setTimeout(() => msg.classList.remove('show'), 3000);
            }).catch((error) => {
                alert('Erro ao adicionar: ' + error.message);
                btnAdicionar.disabled = false;
            });
        }

        function deletarSemana(id) {
            if (confirm('Deseja deletar esta semana?')) {
                semanasRef.child(id).remove().catch((error) => {
                    alert('Erro ao deletar: ' + error.message);
                });
            }
        }

        function iniciarEdicao(id) {
            estaEditando[id] = !estaEditando[id];
            renderizarEscala();
        }

        function salvarEdicao(id, novoNome) {
            if (!novoNome.trim()) {
                alert('Digite um nome válido!');
                return;
            }
            semanasRef.child(id).update({
                operador: novoNome
            }).then(() => {
                estaEditando[id] = false;
                renderizarEscala();
            }).catch((error) => {
                alert('Erro ao atualizar: ' + error.message);
            });
        }

        function formatarData(dateString) {
            const data = new Date(dateString + 'T00:00:00');
            return data.toLocaleDateString('pt-BR', {
                weekday: 'short',
                month: 'short',
                day: 'numeric',
            });
        }

        function obterDiasSemana(dataInicio) {
            const dias = [];
            const data = new Date(dataInicio + 'T00:00:00');
            for (let i = 0; i < 7; i++) {
                const d = new Date(data);
                d.setDate(d.getDate() + i);
                dias.push(d.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit' }));
            }
            return dias;
        }

        function renderizarEscala() {
            const container = document.getElementById('escala-container');

            if (semanas.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-inbox"></i>
                        <h3>Nenhuma semana cadastrada ainda</h3>
                        <p>Adicione uma nova semana para começar a escala</p>
                    </div>
                `;
                return;
            }

            let html = '';
            semanas.forEach(semana => {
                const diasData = obterDiasSemana(semana.dataInicio);
                
                html += `
                    <div class="semana-card">
                        <div class="semana-header">
                            <div class="semana-info">
                                <p>Semana de ${formatarData(semana.dataInicio)}</p>
                                <h3>
                                    <i class="fas fa-user-check"></i>
                                    ${semana.operador || 'Sem operador'}
                                </h3>
                            </div>
                            <div class="semana-actions">
                                <button class="btn btn-secondary" onclick="iniciarEdicao('${semana.id}')">
                                    <i class="fas fa-edit"></i>
                                </button>
                                <button class="btn btn-danger" onclick="deletarSemana('${semana.id}')">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </div>
                        </div>
                `;

                if (estaEditando[semana.id]) {
                    html += `
                        <div class="edit-form">
                            <input type="text" id="edit-${semana.id}" value="${semana.operador}" placeholder="Nome do operador">
                            <div class="buttons">
                                <button class="btn btn-primary" style="flex: 1;" onclick="salvarEdicao('${semana.id}', document.getElementById('edit-${semana.id}').value)">
                                    Salvar
                                </button>
                                <button class="btn btn-secondary" style="flex: 1;" onclick="iniciarEdicao('${semana.id}')">
                                    Cancelar
                                </button>
                            </div>
                        </div>
                    `;
                }

                html += `<div class="dias-grid">`;
                diasSemana.forEach((dia, idx) => {
                    const ehPrincipal = idx === 0 || idx === 6 || idx === 3;
                    html += `
                        <div class="dia-box ${ehPrincipal ? 'principal' : ''}">
                            <div class="dia-nome">${dia}</div>
                            <div class="dia-data">${diasData[idx]}</div>
                            ${ehPrincipal ? '<div class="dia-icon">🎵</div>' : ''}
                        </div>
                    `;
                });
                html += `</div>`;
                html += `</div>`;
            });

            container.innerHTML = html;

            // Adicionar estatísticas
            const operadoresUnicos = new Set(semanas.map(s => s.operador).filter(o => o)).size;
            const stats = `
                <div class="stats">
                    <div class="stat-card">
                        <div class="label">Total de Semanas</div>
                        <div class="value">${semanas.length}</div>
                    </div>
                    <div class="stat-card">
                        <div class="label">Operadores Únicos</div>
                        <div class="value">${operadoresUnicos}</div>
                    </div>
                </div>
            `;
            container.innerHTML += stats;
        }

        // Definir data de hoje por padrão
        const hoje = new Date().toISOString().split('T')[0];
        document.getElementById('dataInicio').value = hoje;

        // Renderização inicial
        renderizarEscala();
    </script>
</body>
</html>
